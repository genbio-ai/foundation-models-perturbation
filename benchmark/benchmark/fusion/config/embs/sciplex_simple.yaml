fusion_model:
  input_transforms:
    - _target_: model.input.LinearInputTransform
      input_dim: 384
      output_dim: ${d_model}
      use_layer_norm: ${use_layer_norm}
      input_key: "ChemBERTa-77M-MLM"
      normalize_type: "none"
    - _target_: model.input.LinearInputTransform
      input_dim: 384
      output_dim: ${d_model}
      use_layer_norm: ${use_layer_norm}
      input_key: "ChemBERTa-77M-MTR"
      normalize_type: "none"
    - _target_: model.input.LinearInputTransform
      input_dim: 126
      output_dim: ${d_model}
      use_layer_norm: ${use_layer_norm}
      input_key: "cats3D"
      normalize_type: "none"
    - _target_: model.input.LinearInputTransform
