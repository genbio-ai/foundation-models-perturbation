      output_dim: ${d_model}
      use_layer_norm: ${use_layer_norm}
      input_key: "maccs"
      normalize_type: "none"
    - _target_: model.input.LinearInputTransform
      input_dim: 2000
      output_dim: ${d_model}
      use_layer_norm: ${use_layer_norm}
      input_key: "secfp"
      normalize_type: "none"
    - _target_: model.input.LinearInputTransform
