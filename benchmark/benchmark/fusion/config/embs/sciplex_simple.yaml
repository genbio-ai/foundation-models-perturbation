datamodule:
  condition_encoders:
    - _target_: data.encoders.TensorLabelEncoder
      key_added: "cell_line_label"
      required_key: "cell_line"
    - _target_: data.encoders.TensorPrecomputedEmbedding
      key_added: "ChemBERTa-77M-MLM"
      required_key: "pert_id"
      adata_path: "sciplex/sciplex_drug_embeddings.h5ad"
      embedding_name: "ChemBERTa-77M-MLM"
    - _target_: data.encoders.TensorPrecomputedEmbedding
      key_added: "ChemBERTa-77M-MTR"
      required_key: "pert_id"
      adata_path: "sciplex/sciplex_drug_embeddings.h5ad"
      embedding_name: "ChemBERTa-77M-MTR"
    - _target_: data.encoders.TensorPrecomputedEmbedding
      key_added: "cats3D"
      required_key: "pert_id"
      adata_path: "sciplex/sciplex_drug_embeddings.h5ad"
