    - _target_: data.encoders.TensorPrecomputedEmbedding
      key_added: "topological"
      required_key: "pert_id"
      adata_path: "sciplex/sciplex_drug_embeddings.h5ad"
      embedding_name: "topological"
    - _target_: data.encoders.TensorPrecomputedEmbedding
      key_added: "avalon"
      required_key: "pert_id"
      adata_path: "sciplex/sciplex_drug_embeddings.h5ad"
      embedding_name: "avalon"
