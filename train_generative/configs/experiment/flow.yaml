# @package _global_
# Flow Matching experiment config
# Usage: python run.py +experiment=flow data_path=... embeddings_path=...

model_type: flow

dit:
  in_channels: 1
  out_channels: 1
  z_emb_dropout: 0.1

flow:
  sampling_timesteps: 250
  step_size: 0.05

training:
  scheduler: "constant_with_warmup"

results_dir: "./results-flow"
